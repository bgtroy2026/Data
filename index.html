<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NIQ Scan Overview — Big Grove Brewery</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
<style>
:root{
  --navy:#1b2449;--lnavy:#252e52;--green:#94bb36;
  --green-dim:rgba(148,187,54,0.10);--green-border:rgba(148,187,54,0.35);
  --bg:#f0f2f6;--card:#ffffff;--border:#e2e6ef;--border2:#edf0f5;
  --text:#1b2449;--text2:#4a5578;--text3:#9aa3bc;
  --red:#dc2626;--red-dim:rgba(220,38,38,0.08);
  --shadow:0 1px 4px rgba(27,36,73,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
a{color:inherit;text-decoration:none}

/* HEADER */
.header{background:var(--navy);border-bottom:3px solid var(--green);padding:0 24px;display:flex;align-items:center;gap:16px;height:64px;position:sticky;top:0;z-index:100}
.header img{height:52px;object-fit:contain}
.header-title{color:#fff;font-weight:800;font-size:17px;letter-spacing:.02em;line-height:1.2}
.header-sub{color:rgba(255,255,255,0.55);font-size:11px;font-weight:400;margin-top:2px}
.header-right{margin-left:auto;color:rgba(255,255,255,0.5);font-size:11px;text-align:right;line-height:1.6}

/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:20px 16px}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:10px;padding:14px 18px;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green)}
.kpi.red::before{background:var(--red)}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:800;color:var(--text)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}
.kpi-chg{font-size:12px;font-weight:700;margin-top:2px}
.pos{color:#16a34a}.neg{color:var(--red)}

/* CONTROLS */
.controls{background:var(--card);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:16px;display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.tab-group{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;flex-shrink:0}
.tab{padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:var(--text2);transition:all .15s;border:none;font-family:inherit}
.tab.active{background:var(--navy);color:#fff}
.tab:not(:last-child){border-right:1px solid var(--border)}
.pill-group{display:flex;gap:4px;flex-shrink:0}
.pill{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--text2);background:#fff;font-family:inherit;transition:all .15s;white-space:nowrap}
.pill.active{background:var(--green);border-color:var(--green);color:#fff}
.search-wrap{flex:1;min-width:160px;max-width:280px}
.search-wrap input{width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;color:var(--text);outline:none;background:#fff}
.search-wrap input:focus{border-color:var(--green)}
.controls-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.chart-btn{padding:7px 14px;border-radius:7px;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:all .15s}
.chart-btn:hover{border-color:var(--green);color:var(--green)}
.chart-btn.open{background:var(--navy);color:#fff;border-color:var(--navy)}
.count-badge{background:var(--green-dim);border:1px solid var(--green-border);color:var(--navy);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}

/* CHARTS */
.charts-section{display:none;margin-bottom:16px}
.charts-section.open{display:block}
.charts-stack{display:flex;flex-direction:column;gap:12px}
.chart-card{background:var(--card);border-radius:10px;padding:18px 20px;box-shadow:var(--shadow);border:1px solid var(--border)}
.chart-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:2px}
.chart-sub{font-size:11px;color:var(--text3);margin-bottom:14px}
.chart-wrap{position:relative;height:220px}

/* TABLE */
.table-card{background:var(--card);border-radius:10px;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
thead th{background:var(--navy);color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:10px 8px;cursor:pointer;white-space:nowrap;user-select:none;position:sticky;top:0}
thead th:hover{background:var(--lnavy)}
thead th.asc::after{content:" ↑"}
thead th.desc::after{content:" ↓"}
thead th:first-child{width:52px;text-align:center}
thead th:nth-child(2){text-align:left;min-width:220px}
thead th:not(:nth-child(2)){text-align:right}
tbody tr{border-bottom:1px solid var(--border2);transition:background .1s;position:relative}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(27,36,73,0.03)}
tbody tr.bgb-row{background:var(--green-dim)}
tbody tr.bgb-row:hover{background:rgba(148,187,54,0.16)}
tbody tr.total-row{background:rgba(27,36,73,0.05);font-weight:700}
td{padding:9px 8px;white-space:nowrap}
td:first-child{text-align:center;font-weight:700;color:var(--text3);font-size:11px}
td:nth-child(2){text-align:left;max-width:300px}
td:not(:nth-child(2)){text-align:right;font-variant-numeric:tabular-nums}
.bgb-badge{display:inline-flex;align-items:center;background:var(--green);color:#fff;font-size:8px;font-weight:800;padding:1px 5px;border-radius:4px;margin-right:5px;letter-spacing:.04em;vertical-align:middle}
.name-main{font-weight:700;color:var(--text)}
.name-sub{font-size:10px;color:var(--text3);margin-top:1px}
.pos{color:#16a34a;font-weight:700}.neg{color:var(--red);font-weight:700}
.neu{color:var(--text3)}
.bar-bg{display:inline-block;width:50px;height:4px;background:var(--border);border-radius:2px;vertical-align:middle;margin-left:4px;position:relative;overflow:hidden}
.bar-fill{position:absolute;top:0;left:0;height:100%;border-radius:2px}

/* TOOLTIP */
.tt{position:fixed;pointer-events:none;z-index:999;background:rgba(20,27,56,.96);color:#fff;border-radius:10px;padding:12px 16px;min-width:240px;max-width:320px;box-shadow:0 4px 24px rgba(0,0,0,0.25);font-size:12px;display:none;border:1px solid rgba(148,187,54,0.3)}
.tt-header{font-size:13px;font-weight:800;color:var(--green);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.12)}
.tt-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:2px 0}
.tt-label{color:rgba(255,255,255,0.55);font-size:10px;white-space:nowrap}
.tt-val{font-weight:700;white-space:nowrap}
.tt-section{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:rgba(148,187,54,0.8);margin:7px 0 3px}
.tt-divider{height:1px;background:rgba(255,255,255,0.1);margin:6px 0}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border2);font-size:11px;color:var(--text3)}
.page-btns{display:flex;gap:4px}
.page-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
.page-btn:disabled{opacity:0.4;cursor:default}
.page-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* RESPONSIVE */
@media(max-width:768px){
  .main{padding:12px 10px}
  .header{padding:0 14px;height:56px}
  .header-title{font-size:14px}
  .header-right{display:none}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi-val{font-size:18px}
  .controls{gap:8px;padding:10px 12px}
  .controls-right{margin-left:0;width:100%}
  .search-wrap{min-width:100%}
  table{font-size:11px;min-width:700px}
}
</style>
</head>

// ===== STATE =====
let view='brand', scope='all', searchQ='', sortKey='rank', sortDir=1, page=0;
const PAGE_SIZE=75;
let charts=[]; let chartsOpen=false;

// ===== UTILS =====
const fmt$=(v,d=0)=>v==null?'—':'$'+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtN=(v,d=0)=>v==null?'—':Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct=(v,d=1)=>v==null?'—':(v*100).toFixed(d)+'%';
const fmtPts=(v)=>v==null?'—':(v>0?'+':'')+v.toFixed(2)+' pts';
const sign=(v)=>v==null?'neu':v>0?'pos':v<0?'neg':'neu';
const arrow=(v)=>v==null?'—':(v>0?'+':'')+fmtPct(v);

function getRows(){
  let rows = (view==='brand')
    ? (scope==='bgb' ? BGB_BRANDS : ALL_BRANDS)
    : (scope==='bgb' ? BGB_ITEMS  : ALL_ITEMS);
  if(searchQ){
    const q=searchQ.toLowerCase();
    rows=rows.filter(r=>r.name.toLowerCase().includes(q));
  }
  return rows;
}

function getSorted(rows){
  return [...rows].sort((a,b)=>{
    let av,bv;
    switch(sortKey){
      case 'rank': av=a.rank??9999; bv=b.rank??9999; break;
      case 'name': av=a.name; bv=b.name; return sortDir*(av<bv?-1:av>bv?1:0);
      case 'share': av=a.share??0; bv=b.share??0; break;
      case 'share_pts': av=a.share_pts??-999; bv=b.share_pts??-999; break;
      case 'sales': av=a.sales??0; bv=b.sales??0; break;
      case 'sales_ya': av=a.sales_ya??0; bv=b.sales_ya??0; break;
      case 'sales_pct': av=a.sales_pct??-999; bv=b.sales_pct??-999; break;
      case 'ce': av=a.ce??0; bv=b.ce??0; break;
      case 'ce_pct': av=a.ce_pct??-999; bv=b.ce_pct??-999; break;
      case 'price': av=a.price??0; bv=b.price??0; break;
      case 'price_pct': av=a.price_pct??-999; bv=b.price_pct??-999; break;
      default: av=a.rank??9999; bv=b.rank??9999;
    }
    return sortDir*(av-bv);
  });
}

function setSort(k){
  if(sortKey===k) sortDir*=-1; else {sortKey=k;sortDir=k==='rank'?1:-1;}
  page=0; render();
}

function setView(v){
  view=v;
  document.getElementById('tab-brand').classList.toggle('active',v==='brand');
  document.getElementById('tab-item').classList.toggle('active',v==='item');
  document.getElementById('searchInput').value='';
  searchQ=''; sortKey='rank'; sortDir=1; page=0;
  document.getElementById('searchInput').placeholder = v==='brand'?'Search brands...':'Search items...';
  if(chartsOpen) rebuildCharts();
  render();
}

function setScope(s){
  scope=s;
  document.getElementById('pill-all').classList.toggle('active',s==='all');
  document.getElementById('pill-bgb').classList.toggle('active',s==='bgb');
  page=0; render();
}

function onSearch(){
  searchQ=document.getElementById('searchInput').value.trim();
  page=0; render();
}

// ===== RENDER HEAD =====
function renderHead(){
  const isBrand=view==='brand';
  const nameLabel=isBrand?'Brand':'Item / SKU';
  const sortClass=(k,dir=1)=>sortKey===k?(sortDir===dir?'asc':'desc'):'';
  let h=`<tr>
    <th onclick="setSort('rank')" class="${sortClass('rank',1)}">Rank</th>
    <th onclick="setSort('name')" class="${sortClass('name')}" style="text-align:left">${nameLabel}</th>
    <th onclick="setSort('share')" class="${sortClass('share',-1)}">$ Share</th>
    <th onclick="setSort('share_pts')" class="${sortClass('share_pts',-1)}">Pts vs YA</th>
    <th onclick="setSort('sales')" class="${sortClass('sales',-1)}">$ Sales</th>
    <th onclick="setSort('sales_ya')" class="${sortClass('sales_ya',-1)}">$ Sales YA</th>
    <th onclick="setSort('sales_pct')" class="${sortClass('sales_pct',-1)}">$ % vs YA</th>
    <th onclick="setSort('ce')" class="${sortClass('ce',-1)}">CE Vol</th>
    <th onclick="setSort('ce_pct')" class="${sortClass('ce_pct',-1)}">CE % vs YA</th>
    <th onclick="setSort('price')" class="${sortClass('price',-1)}">${isBrand?'$/CE':'$/Unit'}</th>
    <th onclick="setSort('price_pct')" class="${sortClass('price_pct',-1)}">Price % vs YA</th>
  </tr>`;
  document.getElementById('tableHead').innerHTML=h;
}

// ===== RENDER BODY =====
function renderBody(rows){
  const maxSales=Math.max(...rows.map(r=>r.sales||0),1);
  const start=page*PAGE_SIZE, end=start+PAGE_SIZE;
  const slice=rows.slice(start,end);
  let html='';
  for(const r of slice){
    const isBGB=r.is_bgb;
    const cls=isBGB?'bgb-row':'';
    const badge=isBGB?'<span class="bgb-badge">BGB</span>':'';
    const sharePts=r.share_pts;
    const salesPct=r.sales_pct;
    const cePct=r.ce_pct;
    const pricePct=r.price_pct;
    const barW=Math.round((r.sales||0)/maxSales*50);
    const nameDisplay=isBGB&&scope==='all'
      ? r.name.replace('BIG GROVE ','')
      : r.name;
    html+=`<tr class="${cls}" onmouseenter="showTT(event,this)" onmouseleave="hideTT()"
      data-idx="${rows.indexOf(r)}"
      data-name="${r.name.replace(/"/g,'&quot;')}"
      data-share="${r.share}" data-share_pts="${r.share_pts}"
      data-sales="${r.sales}" data-sales_ya="${r.sales_ya}" data-sales_pct="${r.sales_pct}"
      data-ce="${r.ce}" data-ce_ya="${r.ce_ya}" data-ce_pct="${r.ce_pct}"
      data-price="${r.price}" data-price_pct="${r.price_pct}" data-is_bgb="${r.is_bgb}"
      data-sales_chg="${r.sales_chg}" data-ce_chg="${r.ce_chg}"
    >
      <td>${r.rank?'#'+Math.round(r.rank):'—'}</td>
      <td><div class="name-main">${badge}${nameDisplay}</div></td>
      <td>${r.share?r.share.toFixed(2)+'%':'—'}</td>
      <td class="${sign(sharePts)}">${fmtPts(sharePts)}</td>
      <td>${fmt$(r.sales)} <span class="bar-bg"><span class="bar-fill" style="width:${barW}px;background:${isBGB?'#94bb36':'#c7ccdc'}"></span></span></td>
      <td>${fmt$(r.sales_ya)}</td>
      <td class="${sign(salesPct)}">${arrow(salesPct)}</td>
      <td>${fmtN(r.ce,0)}</td>
      <td class="${sign(cePct)}">${cePct!=null?arrow(cePct):'—'}</td>
      <td>${r.price?'$'+r.price.toFixed(2):'—'}</td>
      <td class="${sign(pricePct)}">${pricePct!=null?arrow(pricePct):'—'}</td>
    </tr>`;
  }
  document.getElementById('tableBody').innerHTML=html;
}

// ===== TOOLTIP =====
const tt=document.getElementById('tooltip');
function showTT(e,row){
  const d=row.dataset;
  const isBGB=d.is_bgb==='true';
  const name=d.name;
  const sales=parseFloat(d.sales)||0;
  const salesYA=parseFloat(d.sales_ya)||0;
  const salesPct=parseFloat(d.sales_pct);
  const salesChg=parseFloat(d.sales_chg)||0;
  const ce=parseFloat(d.ce)||0;
  const ceYA=parseFloat(d.ce_ya)||0;
  const cePct=parseFloat(d.ce_pct);
  const ceChg=parseFloat(d.ce_chg)||0;
  const share=parseFloat(d.share)||0;
  const sharePts=parseFloat(d.share_pts);
  const price=parseFloat(d.price)||0;
  const pricePct=parseFloat(d.price_pct);

  const pctHtml=(v)=>{
    if(isNaN(v)) return '<span class="neu">—</span>';
    const s=(v>0?'+':'')+((v*100).toFixed(1))+'%';
    return `<span class="${v>0?'pos':v<0?'neg':'neu'}">${s}</span>`;
  };

  const nameDisplay=isBGB?name.replace('BIG GROVE ',''):name;
  const bgbSection=isBGB?`
    <div class="tt-section">Big Grove Brand</div>
    <div class="tt-row"><span class="tt-label">$ Rank in Market</span><span class="tt-val" style="color:var(--green)">#${d.idx||1}</span></div>
  `:'';

  tt.innerHTML=`
    <div class="tt-header">${isBGB?'<span style="color:#94bb36">● BGB</span> ':''}${nameDisplay}</div>
    <div class="tt-section">$ Sales</div>
    <div class="tt-row"><span class="tt-label">Current Period</span><span class="tt-val">${fmt$(sales)}</span></div>
    <div class="tt-row"><span class="tt-label">Year Ago</span><span class="tt-val">${fmt$(salesYA)}</span></div>
    <div class="tt-row"><span class="tt-label">Change $</span><span class="tt-val ${salesChg>=0?'pos':'neg'}">${salesChg>=0?'+':''}${fmt$(salesChg)}</span></div>
    <div class="tt-row"><span class="tt-label">Change %</span><span class="tt-val">${pctHtml(salesPct)}</span></div>
    <div class="tt-divider"></div>
    <div class="tt-section">Volume (CE)</div>
    <div class="tt-row"><span class="tt-label">Current CE</span><span class="tt-val">${fmtN(ce,1)}</span></div>
    <div class="tt-row"><span class="tt-label">Year Ago CE</span><span class="tt-val">${fmtN(ceYA,1)}</span></div>
    <div class="tt-row"><span class="tt-label">Change %</span><span class="tt-val">${pctHtml(cePct)}</span></div>
    <div class="tt-divider"></div>
    <div class="tt-section">Share & Price</div>
    <div class="tt-row"><span class="tt-label">$ Share</span><span class="tt-val">${share.toFixed(2)}%</span></div>
    <div class="tt-row"><span class="tt-label">Share Pts vs YA</span><span class="tt-val ${sharePts>=0?'pos':'neg'}">${!isNaN(sharePts)?(sharePts>0?'+':'')+sharePts.toFixed(2)+' pts':'—'}</span></div>
    <div class="tt-row"><span class="tt-label">Price / ${view==='brand'?'CE':'Unit'}</span><span class="tt-val">${price?'$'+price.toFixed(2):'—'}</span></div>
    <div class="tt-row"><span class="tt-label">Price % vs YA</span><span class="tt-val">${pctHtml(pricePct)}</span></div>
  `;
  tt.style.display='block';
  moveTT(e);
}

function moveTT(e){
  const x=e.clientX+14, y=e.clientY+10;
  const W=window.innerWidth, H=window.innerHeight;
  const tw=320, th=300;
  tt.style.left=(x+tw>W?x-tw-20:x)+'px';
  tt.style.top=(y+th>H?y-th-10:y)+'px';
}
function hideTT(){tt.style.display='none';}
document.addEventListener('mousemove',moveTT);

// ===== PAGINATION =====
function renderPagination(total){
  const totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  const start=page*PAGE_SIZE+1, end=Math.min((page+1)*PAGE_SIZE,total);
  document.getElementById('pag-info').textContent=total>0?`Showing ${start}–${end} of ${total}`:'No results';
  document.getElementById('count-badge').textContent=total+' rows';
  let btns='';
  if(totalPages<=7){
    for(let i=0;i<totalPages;i++) btns+=`<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i+1}</button>`;
  } else {
    btns=`<button class="page-btn" onclick="goPage(0)">1</button>`;
    if(page>2) btns+='<span style="padding:0 4px">…</span>';
    for(let i=Math.max(1,page-1);i<=Math.min(totalPages-2,page+1);i++)
      btns+=`<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i+1}</button>`;
    if(page<totalPages-3) btns+='<span style="padding:0 4px">…</span>';
    btns+=`<button class="page-btn${totalPages-1===page?' active':''}" onclick="goPage(${totalPages-1})">${totalPages}</button>`;
  }
  document.getElementById('pag-btns').innerHTML=btns;
}

function goPage(p){page=p;render();}

// ===== MAIN RENDER =====
function render(){
  renderHead();
  const rows=getRows();
  const sorted=getSorted(rows);
  renderBody(sorted);
  renderPagination(sorted.length);
  // highlight active sort header
  document.querySelectorAll('thead th').forEach(th=>{
    th.classList.remove('asc','desc');
    if(th.onclick&&th.onclick.toString().includes(`'${sortKey}'`)){
      th.classList.add(sortDir===1?'asc':'desc');
    }
  });
}

// ===== CHARTS =====
function toggleCharts(){
  chartsOpen=!chartsOpen;
  document.getElementById('chartsSection').classList.toggle('open',chartsOpen);
  document.getElementById('chartBtn').classList.toggle('open',chartsOpen);
  document.getElementById('chartBtn').textContent=chartsOpen?'📊 Hide Charts':'📊 Show Charts';
  if(chartsOpen) rebuildCharts();
}

function destroyCharts(){charts.forEach(c=>c.destroy());charts=[];}

function rebuildCharts(){
  destroyCharts();
  const NAVY='#1b2449',GREEN='#94bb36',GREEN_DIM='rgba(148,187,54,0.7)',NAVY_DIM='rgba(27,36,73,0.45)';
  const TOOLTIP_BG='rgba(20,27,56,.96)';
  const ttOpts={
    backgroundColor:TOOLTIP_BG,titleColor:GREEN,bodyColor:'#fff',
    padding:12,cornerRadius:8,titleFont:{weight:'bold',size:12},
    borderColor:'rgba(148,187,54,0.3)',borderWidth:1
  };

  // Chart 1: Top 15 Brands bar
  const c1labels=CHART_DATA.map(b=>b.is_bgb?b.name.replace('BIG GROVE ',''):b.name);
  const c1colors=CHART_DATA.map(b=>b.is_bgb?GREEN_DIM:NAVY_DIM);
  charts.push(new Chart(document.getElementById('chart1'),{
    type:'bar',
    data:{labels:c1labels,datasets:[{
      label:'$ Sales',data:CHART_DATA.map(b=>b.sales),
      backgroundColor:c1colors,borderColor:CHART_DATA.map(b=>b.is_bgb?GREEN:NAVY),
      borderWidth:1.5,borderRadius:4
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...ttOpts,callbacks:{
        label:(ctx)=>'$ Sales: $'+ctx.parsed.y.toLocaleString('en-US',{maximumFractionDigits:0}),
        afterLabel:(ctx)=>{
          const b=CHART_DATA[ctx.dataIndex];
          return [`Share: ${b.share.toFixed(2)}%`,'vs YA: '+(b.sales_pct*100).toFixed(1)+'%','CE: '+b.ce.toLocaleString('en-US',{maximumFractionDigits:0})];
        }
      }}},
      scales:{x:{ticks:{color:NAVY,font:{size:10},maxRotation:35}},y:{ticks:{color:NAVY,callback:(v)=>'$'+v.toLocaleString()}}}
    }
  }));

  // Chart 2: BGB brand breakdown horizontal bar
  const bgbS=[...BGB_BRANDS].sort((a,b)=>b.sales-a.sales).slice(0,12);
  charts.push(new Chart(document.getElementById('chart2'),{
    type:'bar',
    data:{labels:bgbS.map(b=>b.name.replace('BIG GROVE ','')),datasets:[
      {label:'Current $',data:bgbS.map(b=>b.sales),backgroundColor:GREEN_DIM,borderColor:GREEN,borderWidth:1.5,borderRadius:4},
      {label:'Year Ago $',data:bgbS.map(b=>b.sales_ya),backgroundColor:'rgba(27,36,73,0.25)',borderColor:NAVY,borderWidth:1.5,borderRadius:4}
    ]},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:NAVY,font:{size:11}}},tooltip:{...ttOpts,callbacks:{
        label:(ctx)=>ctx.dataset.label+': $'+ctx.parsed.x.toLocaleString('en-US',{maximumFractionDigits:0})
      }}},
      scales:{x:{ticks:{callback:(v)=>'$'+v.toLocaleString(),color:NAVY}},y:{ticks:{color:NAVY,font:{size:10}}}}
    }
  }));

  // Chart 3: BGB YOY growth
  const bgbG=BGB_BRANDS.filter(b=>b.sales_ya>500 && b.sales_pct!=null).sort((a,b)=>b.sales_pct-a.sales_pct);
  charts.push(new Chart(document.getElementById('chart3'),{
    type:'bar',
    data:{labels:bgbG.map(b=>b.name.replace('BIG GROVE ','')),datasets:[{
      label:'% vs YA',data:bgbG.map(b=>b.sales_pct*100),
      backgroundColor:bgbG.map(b=>b.sales_pct>=0?GREEN_DIM:'rgba(220,38,38,0.55)'),
      borderColor:bgbG.map(b=>b.sales_pct>=0?GREEN:'#dc2626'),
      borderWidth:1.5,borderRadius:4
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...ttOpts,callbacks:{
        label:(ctx)=>{const b=bgbG[ctx.dataIndex];return['% vs YA: '+(ctx.parsed.y>=0?'+':'')+ctx.parsed.y.toFixed(1)+'%','$ Sales: $'+b.sales.toLocaleString('en-US',{maximumFractionDigits:0}),`Share: ${b.share.toFixed(2)}%`]}
      }}},
      scales:{
        x:{ticks:{color:NAVY,font:{size:10},maxRotation:30}},
        y:{ticks:{color:NAVY,callback:(v)=>(v>=0?'+':'')+v+'%'}}
      }
    }
  }));
}

// ===== INIT =====
render();
</script>
</body>
